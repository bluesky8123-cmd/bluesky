<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日文摘 · Daily Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #faf9f7;
      --bg-secondary: #f4f2ed;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #8a8a8a;
      --accent-coral: #e07850;
      --accent-teal: #2eb890;
      --accent-blue: #4a90d9;
      --border-light: #e8e4de;
      --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* 头部设计 */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2a26 100%);
      color: #fff;
      padding: 80px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .header-content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }

    .header-date {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header-date::before,
    .header-date::after {
      content: '';
      width: 30px;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .header-title span {
      background: linear-gradient(135deg, var(--accent-coral), var(--accent-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
      max-width: 450px;
      margin: 0 auto;
    }

    /* 主要内容区 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* 板块标签 */
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
      transition: transform 0.3s ease;
    }

    .section-badge:hover {
      transform: translateY(-2px);
    }

    .badge-gaming {
      background: linear-gradient(135deg, #fceee9, #f9d9c9);
      color: #c24a20;
      box-shadow: 0 4px 15px rgba(224, 120, 80, 0.2);
    }

    .badge-ai {
      background: linear-gradient(135deg, #e8f2fc, #c5e0f5);
      color: #2a6db0;
      box-shadow: 0 4px 15px rgba(74, 144, 217, 0.2);
    }

    .badge-golf {
      background: linear-gradient(135deg, #e5f5ed, #c0e5d0);
      color: #1e8a55;
      box-shadow: 0 4px 15px rgba(46, 184, 144, 0.2);
    }

    .section-badge svg {
      width: 16px;
      height: 16px;
    }

    /* 内容板块 */
    .content-section {
      margin-bottom: 100px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.6s ease forwards;
    }

    .content-section:nth-child(1) { animation-delay: 0.1s; }
    .content-section:nth-child(2) { animation-delay: 0.2s; }
    .content-section:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .section-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: auto;
    }

    /* 文章网格 */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    /* 文章卡片 - 可点击整卡片 */
    .article-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, 
                  box-shadow 0.3s ease;
      border: 1px solid var(--border-light);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.5s ease forwards;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    /* 普通卡片链接样式 */
    .article-card:not(.featured) {
      cursor: pointer;
    }

    .article-card:not(.featured):hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    /* 带缩略图的卡片 */
    .article-card.with-thumb {
      flex-direction: row;
      align-items: flex-start;
    }

    .article-card.with-thumb .article-content {
      flex: 1;
      min-width: 0;
    }

    .article-card.with-thumb .article-thumb {
      width: 100px;
      min-width: 100px;
      height: 100px;
      margin: 16px;
      margin-left: 0;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .article-card.with-thumb .article-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .article-card.with-thumb:hover .article-thumb img {
      transform: scale(1.05);
    }

    /* Featured 卡片 */
    .article-card.featured {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      border: none;
      background: transparent;
      margin-bottom: 10px;
    }

    .article-card.featured:not(.has-image) {
      grid-template-columns: 1fr;
    }

    .featured-inner {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    @media (max-width: 768px) {
      .article-card.featured {
        grid-template-columns: 1fr;
      }
      
      .article-card.with-thumb {
        flex-direction: column;
      }
      
      .article-card.with-thumb .article-thumb {
        width: 100%;
        height: 120px;
        margin: 0;
        margin-bottom: 12px;
        border-radius: 0;
      }
    }

    .article-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .article-card.featured:not(.has-image) .article-image {
      display: none;
    }

    .article-card.featured.has-image .article-image {
      height: 100%;
      border-radius: 12px 0 0 12px;
    }

    .article-card.featured.has-image .featured-inner {
      border-radius: 0 12px 12px 0;
    }

    .article-card:hover .article-image {
      transform: scale(1.03);
    }

    .article-content {
      padding: 20px;
    }

    .article-card.featured .article-content {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .article-source {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .source-gaming { color: var(--accent-coral); }
    .source-ai { color: var(--accent-blue); }
    .source-golf { color: var(--accent-teal); }

    .article-time {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .article-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .article-card:hover .article-title {
      color: var(--accent-coral);
    }

    .article-card.featured .article-title {
      font-size: 22px;
      line-height: 1.3;
    }

    .article-excerpt {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .article-card.featured .article-excerpt {
      -webkit-line-clamp: 3;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 5px 14px;
      background: var(--bg-secondary);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .tag:hover {
      background: var(--border-light);
      color: var(--text-secondary);
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--bg-secondary);
      border-radius: 25px;
      transition: all 0.3s ease;
    }

    .read-more:hover {
      background: var(--text-primary);
      color: #fff;
      gap: 12px;
    }

    /* 页脚 */
    .footer {
      background: #1a1a1a;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 60px 24px;
    }

    .footer-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .footer-tagline {
      font-size: 14px;
      margin-bottom: 30px;
      opacity: 0.6;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .footer-link {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: rgba(255,255,255,0.8);
    }

    .footer-copy {
      font-size: 12px;
      opacity: 0.3;
    }

    /* 精选摘要式布局（游戏和AI板块） */
    .curated-section {
      margin-bottom: 60px;
    }

    /* 摘要框 */
    .category-summary {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 32px 36px;
      margin-bottom: 32px;
      border: 1px solid var(--border-light);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease forwards;
    }

    .category-summary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }

    .summary-gaming::before { background: var(--accent-coral); }
    .summary-ai::before { background: var(--accent-blue); }

    .category-summary .summary-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .summary-gaming .summary-label { color: var(--accent-coral); }
    .summary-ai .summary-label { color: var(--accent-blue); }

    .category-summary .summary-text {
      font-size: 16px;
      line-height: 1.85;
      color: var(--text-secondary);
    }

    /* 精选文章列表 */
    .curated-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .curated-item {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateX(-10px);
      animation: fadeInRight 0.5s ease forwards;
    }

    .curated-item:nth-child(1) { animation-delay: 0.1s; }
    .curated-item:nth-child(2) { animation-delay: 0.15s; }
    .curated-item:nth-child(3) { animation-delay: 0.2s; }
    .curated-item:nth-child(4) { animation-delay: 0.25s; }
    .curated-item:nth-child(5) { animation-delay: 0.3s; }

    @keyframes fadeInRight {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .curated-item:hover {
      transform: translateX(8px);
      box-shadow: var(--shadow-hover);
      border-color: transparent;
    }

    .curated-item:hover .curated-title {
      color: var(--accent-coral);
    }

    .curated-ai:hover .curated-title {
      color: var(--accent-blue);
    }

    .curated-number {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--border-light);
      min-width: 40px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.3s;
    }

    .curated-item:hover .curated-number {
      color: var(--accent-coral);
    }

    .curated-ai:hover .curated-number {
      color: var(--accent-blue);
    }

    .curated-content {
      flex: 1;
      min-width: 0;
    }

    .curated-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .curated-source {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .source-tag-gaming {
      background: #fceee9;
      color: #c24a20;
    }

    .source-tag-ai {
      background: #e8f2fc;
      color: #2a6db0;
    }

    .curated-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
      transition: color 0.3s;
    }

    .curated-excerpt {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .curated-arrow {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--border-light);
      transition: all 0.3s;
    }

    .curated-item:hover .curated-arrow {
      color: var(--text-secondary);
      transform: translateX(4px);
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .header {
        padding: 50px 20px 40px;
      }
      
      .container {
        padding: 40px 16px 60px;
      }

      .articles-grid {
        grid-template-columns: 1fr;
      }

      .section-title {
        font-size: 26px;
      }

      .article-title {
        font-size: 18px;
      }

      .article-card.featured .article-title {
        font-size: 22px;
      }

      .footer-links {
        flex-direction: column;
        gap: 15px;
      }

      .category-summary {
        padding: 24px 20px;
      }

      .curated-item {
        padding: 16px 18px;
      }

      .curated-number {
        font-size: 22px;
        min-width: 30px;
      }

      .curated-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- 头部 -->
  <header class="header">
    <div class="header-content">
      <div class="header-date" id="currentDate"></div>
      <h1 class="header-title">每日<span>文摘</span></h1>
      <p class="header-subtitle">为你精选游戏、AI科技、高尔夫运动领域的每日资讯，洞悉行业前沿</p>
    </div>
  </header>

  <main class="container">
    {{CONTENT}}
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-brand">每日文摘</div>
    <p class="footer-tagline">每日更新 · 游戏 · AI · 高尔夫</p>
    <div class="footer-links">
      <a href="#" class="footer-link">关于我们</a>
      <a href="#" class="footer-link">订阅方式</a>
      <a href="#" class="footer-link">联系方式</a>
    </div>
    <p class="footer-copy">© 2026 Daily Digest. Powered by Automated Content System.</p>
  </footer>

  <script>
    // 显示当前日期
    const dateEl = document.getElementById('currentDate');
    const now = new Date();
    const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekDays[now.getDay()]}`;
    const volume = `${now.getFullYear() - 2000}${(now.getMonth() + 1).toString().padStart(2, '0')}`;
    dateEl.textContent = `${dateStr} · 第 ${volume} 期`;
  </script>

</body>
</html>
