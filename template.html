<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日文摘 · Daily Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fefbf6;
      --bg-secondary: #faf7f2;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent-coral: #d85a30;
      --accent-teal: #1d9e75;
      --accent-blue: #378add;
      --border-light: #e8e0d8;
      --border-medium: #d4c8b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      padding: 60px 24px 40px;
      text-align: center;
    }

    .header-date {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .header-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      max-width: 500px;
      margin: 0 auto;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .badge-gaming { background: linear-gradient(135deg, #faece7, #f5c4b3); color: #993c1d; }
    .badge-ai { background: linear-gradient(135deg, #e6f1fb, #b5d4f4); color: #185fa5; }
    .badge-golf { background: linear-gradient(135deg, #eaf3de, #c0dd97); color: #3b6d11; }

    .content-section { margin-bottom: 80px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--text-primary);
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
    }

    .section-line { flex: 1; height: 1px; background: var(--border-light); }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }

    .article-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid var(--border-light);
    }

    .article-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .article-card.featured {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
    }

    @media (max-width: 768px) {
      .article-card.featured { grid-template-columns: 1fr; }
    }

    .article-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--border-light) 100%);
    }

    .article-card.featured .article-image {
      height: 100%;
      min-height: 280px;
    }

    .article-content { padding: 24px; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .article-source { font-weight: 500; }

    .article-time { display: flex; align-items: center; gap: 4px; }

    .article-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .article-card.featured .article-title { font-size: 28px; }

    .article-excerpt {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .article-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-radius: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s ease;
    }

    .read-more:hover { gap: 10px; }

    .footer {
      background: #1a1a1a;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 40px 24px;
      font-size: 13px;
    }

    .footer-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: fadeInUp 0.6s ease forwards; }

    @media (max-width: 640px) {
      .header { padding: 40px 20px 30px; }
      .container { padding: 24px 16px 60px; }
      .articles-grid { grid-template-columns: 1fr; }
      .section-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-date">{{DATE}}</div>
    <h1 class="header-title">每日文摘</h1>
    <p class="header-subtitle">精选游戏、AI科技、高尔夫运动领域的每日资讯，为你呈现最有价值的内容</p>
  </header>

  <main class="container">
    {{GAMING_CONTENT}}
    {{AI_CONTENT}}
    {{GOLF_CONTENT}}
  </main>

  <footer class="footer">
    <div class="footer-brand">每日文摘</div>
    <p>每日更新 · 游戏 · AI · 高尔夫</p>
    <p style="margin-top: 16px; opacity: 0.4;">Powered by Automated Content System</p>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('animate-in');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.article-card').forEach(card => observer.observe(card));
  </script>

</body>
</html>
